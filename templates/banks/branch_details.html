<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Profile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-card {
            background: #ffffff;
            width: 400px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .profile-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .profile-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .profile-item strong {
            color: #4e73df;
            display: inline-block;
            width: 130px;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>User Profile</h2>

    {% for key, value in data.items %}
        <div class="profile-item">
            <strong>{{ key|title }}:</strong> {{ value }}
        </div>
    {% endfor %}

</div>

</body>
</html>
