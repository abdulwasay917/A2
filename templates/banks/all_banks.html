<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Banks</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right h2 {
            margin: 0 15px 0 0;
            font-size: 16px;
            font-weight: 400;
        }

        .button {
            background: white;
            color: #2a5298;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .button:hover {
            background: #163a6b;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .bank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .bank-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .bank-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .bank-card a {
            text-decoration: none;
            color: #1e3c72;
            font-size: 18px;
            font-weight: 600;
        }

        .no-record {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #888;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .header-right {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>All Banks</h1>
    <div class="header-right">
        {% if user.is_authenticated %}
            <h2>Hi, {{ request.user.username }}!</h2>
            <a href="/accounts/dashboard/" class="button">Dashboard</a>
            <a href="/accounts/logout/" class="button">Logout</a>
        {% else %}
            <a href="/accounts/login/" class="button">Login</a>
        {% endif %}
    </div>
</header>

<div class="container">
    {% if banks %}
        <div class="bank-grid">
            {% for bank in banks %}
                <div class="bank-card">
                    <a href="/banks/{{ bank.id }}/details/">
                        {{ bank.name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="no-record">
            No Records Found
        </div>
    {% endif %}
</div>

</body>
</html>
