<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Branch</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-card {
            background: #ffffff;
            padding: 40px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .form-card h1 {
            margin-top: 0;
            text-align: center;
            color: #1e3c72;
            margin-bottom: 25px;
        }

        form p {
            margin-bottom: 15px;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 8px 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 6px rgba(42, 82, 152, 0.3);
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-update {
            background: #2a5298;
            color: white;
        }

        .btn-update:hover {
            background: #1e3c72;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h1>Edit Branch {{ branch.name }}</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit" class="btn btn-update">Update</button>
            <a href="javascript:history.back()" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
