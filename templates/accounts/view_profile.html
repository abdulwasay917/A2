<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 400px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .profile-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .profile-item strong {
            color: #4e73df;
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #2e59d9;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>User Profile</h2>

    {% for key, value in data.items %}
        <div class="profile-item">
            <strong>{{ key|title }}:</strong> {{ value }}
        </div>
    {% endfor %}

    <a href="{% url 'edit' user.pk %}" class="btn">Edit Profile</a>
</div>

</body>
</html>
