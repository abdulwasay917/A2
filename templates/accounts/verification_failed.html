<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Failed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8d7da;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #f5c6cb;
        }
        h1 {
            color: #dc3545;
        }
        p {
            font-size: 16px;
            margin: 20px 0;
        }
        a.button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        a.button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌ Verification Failed</h1>
        <p>Sorry, your verification link is invalid or has expired. Please request a new verification email.</p>
        <a href="{% url 'signup' %}" class="button">Resend Verification Email</a>
    </div>
</body>
</html>
